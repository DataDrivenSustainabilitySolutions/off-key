name: Docker Images

on:
  workflow_call:
    inputs:
      publish:
        required: true
        type: boolean
      cache-scope-prefix:
        required: true
        type: string
      cache-fallback-scope-prefix:
        required: false
        type: string
        default: ""

jobs:
  build-images:
    name: build-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            image_name: off-key-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build_args: ""
          - service: api-gateway
            image_name: off-key-api-gateway
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-api-gateway
              SERVICE_ROOT=services/api/gateway
          - service: tactic-middleware
            image_name: off-key-tactic-middleware
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-tactic-middleware
              SERVICE_ROOT=services/middleware/tactic
          - service: mqtt-radar
            image_name: off-key-mqtt-radar
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-mqtt-radar
              SERVICE_ROOT=services/mqtt/radar
          - service: mqtt-proxy
            image_name: off-key-mqtt-proxy
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-mqtt-proxy
              SERVICE_ROOT=services/mqtt/proxy
          - service: mqtt-simulator
            image_name: off-key-mqtt-simulator
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-mqtt-simulator
              SERVICE_ROOT=services/mqtt/simulator
          - service: db-sync
            image_name: off-key-db-sync
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-db-sync
              SERVICE_ROOT=services/db/sync

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Normalize registry owner
        id: owner
        if: ${{ inputs.publish }}
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.publish }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: ${{ inputs.publish }}
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build image
        if: ${{ !inputs.publish }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          push: false
          load: false
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}
            ${{ inputs.cache-fallback-scope-prefix && format('type=gha,scope={0}-{1}', inputs.cache-fallback-scope-prefix, matrix.service) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}

      - name: Build and push image
        id: build
        if: ${{ inputs.publish }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}
            ${{ inputs.cache-fallback-scope-prefix && format('type=gha,scope={0}-{1}', inputs.cache-fallback-scope-prefix, matrix.service) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}

      - name: Attest build provenance
        if: ${{ inputs.publish }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  docker-validate:
    name: docker-validate
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ !inputs.publish && always() }}

    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.build-images.result }}" != "success" ]; then
            echo "At least one container build failed."
            exit 1
          fi
