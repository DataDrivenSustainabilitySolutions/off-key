# .github/workflows/docker-compose-build-and-push.yml
name: Build & Push via Compose

on:
  push:
    branches:
      - main

permissions:
  contents: read      # for actions/checkout
  packages: write     # to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Override image tags to “latest”
        run: |
          echo "API_IMAGE=ghcr.io/${{ github.repository_owner }}/off-key-api:latest" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/off-key-frontend:latest" >> $GITHUB_ENV

      - name: Build all services via Compose
        run: docker compose build --parallel

      - name: Push all images via Compose
        run: docker compose push
