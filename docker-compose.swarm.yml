services:

  postgres:
    image: timescale/timescaledb:latest-pg15
    env_file: .env
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.backend == true ]
      restart_policy:
        condition: any

  api:
    image: "${API_IMAGE:-off-key-api-gateway:latest}"
    env_file: .env
    networks:
      - app-network
    command: ["uvicorn", "off_key_api_gateway.main:app",
              "--reload", "--reload-dir", "/app/lib/python3.12/site-packages/off_key_api_gateway",
              "--host", "", "--port", "8000"]
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.labels.backend == true ]
      restart_policy:
        condition: any

  tactic:
    image: "${TACTIC_IMAGE:-off-key-tactic-middleware:latest}"
    env_file: .env
    networks:
      - app-network
      - socket-network
    environment:
      - TACTIC_DOCKER_DEFAULT_NETWORK=off-key_emqx-network
    command: [ "/app/bin/python", "-m", "off_key_tactic_middleware" ]
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.frontend == true ]
      restart_policy:
        condition: any

  socket-proxy:
    image: tecnativa/docker-socket-proxy
    networks:
      - socket-network
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - LOG_LEVEL=info # debug,info,notice,warning,err,crit,alert,emerg
      ## Variables match the URL prefix (i.e. AUTH blocks access to /auth/* parts of the API, etc.).
      # 0 to revoke access.
      # 1 to grant access.
      ## Granted by Default
      - EVENTS=1
      - PING=1
      - VERSION=1
      ## Revoked by Default
      # Security critical
      - AUTH=0
      - SECRETS=0
      - POST=1 # Container(s) Lifecycle Management
      # Not always needed
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - CONTAINERS=1 # Required by TACTIC RADAR container fallback and cleanup.
      - DISTRIBUTION=0
      - EXEC=0
      - IMAGES=0
      - INFO=1 # Required for Swarm manager detection.
      - NETWORKS=0
      - NODES=0
      - PLUGINS=0
      - SERVICES=1 # Required by TACTIC RADAR Swarm orchestration.
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=1 # Required for Swarm service status checks.
      - VOLUMES=0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  frontend:
    image: "${FRONTEND_IMAGE:-off-key-frontend:latest}"
    env_file: .env
    networks:
      - public-network
      - app-network
    environment:
      - __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS=${VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS:-}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [ node.labels.frontend == true ]
      restart_policy:
        condition: any

  mailpit:
    image: axllent/mailpit:latest
    env_file: .env
    networks:
      - public-network
      - app-network
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.backend == true ]
      restart_policy:
        condition: any

  db-sync:
    image: "${DB_SYNC_IMAGE:-off-key-db-sync:latest}"
    env_file: .env
    command: [ "/app/bin/python", "-m", "off_key_db_sync" ]
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "/app/bin/python", "-c",
              "import urllib.request; urllib.request.urlopen('http://localhost:8009/ready/schema', timeout=2)" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

  mqtt-proxy:
    image: "${MQTT_PROXY_IMAGE:-off-key-mqtt-proxy:latest}"
    env_file: .env
    command: ["/app/bin/python", "-m", "off_key_mqtt_proxy"]
    networks:
      - app-network
      - emqx-network
    environment:
      - MQTT_TELEMETRY_ENABLED=false
    deploy:
      mode: replicated
      replicas: 0
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

  mqtt-radar:
    image: "${MQTT_RADAR_IMAGE:-ghcr.io/datadrivensustainabilitysolutions/off-key-mqtt-radar:latest}"
    env_file: .env
    command: [ "/app/bin/python", "-m", "off_key_mqtt_radar" ]
    networks:
      - app-network
      - emqx-network
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

  emqx-main:
    image: emqx/emqx:6.2.2
    env_file: .env
    environment:
      - "EMQX_NODE_NAME=emqx@emqx-main"
      - "EMQX_CLUSTER__DISCOVERY_STRATEGY=static"
      - "EMQX_CLUSTER__STATIC__SEEDS=[emqx@emqx-main]"
    networks:
      emqx-network:
        aliases:
          - emqx-main
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

# Overlay encryption is intentionally disabled because it is incompatible with
# the Tailscale ingress path. MTU 1280 preserves Tailscale compatibility.
networks:
  public-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
  app-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
    attachable: true
  socket-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
  emqx-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
