services:

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: postgres_database
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.role == manager

  api:
#   image: ghcr.io/seffs/off-key-api:latest
    container_name: fastapi_backend
    env_file: .env
    user: root
    ports:
      - target: 8000
        published: 8000
        mode: host
    depends_on:
      - postgres
    networks:
      - app-network
    restart: always
#    TODO: This healthcheck doesn't work for now
#    healthcheck:
#      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
#      interval: 10s
#      retries: 5
    volumes:
      - /etc/docker/ca.pem:/etc/docker/ca.pem
      - /etc/docker/client-cert.pem:/etc/docker/client-cert.pem
      - /etc/docker/client-key.pem:/etc/docker/client-key.pem
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.role == worker
#        preferences:
#          - spread: node.labels.type  # Distribute evenly
#      TODO: Measure resources with MQTT images
#      resources:
#        limits:
#          cpus: '0.2'
#          memory: 512M

  frontend:
#    image: ghcr.io/seffs/off-key-frontend:latest
    container_name: react_frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/src
      - /src/node_modules  # Prevent conflicts
    deploy:
      mode: replicated
      replicas: 2
      placement:
        constraints:
          - node.role == worker
#        preferences:
#          - spread: node.labels.type  # Distribute evenly
#      resources:
#        limits:
#          cpus: '1'
#          memory: 512M

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - '8025:8025'  # Web UI
      - '1025:1025'  # SMTP port
    deploy:
      placement:
        constraints:
          - node.role == manager

networks:
  app-network:
    driver: overlay

volumes:
  postgres_data: