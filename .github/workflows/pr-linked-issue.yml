name: PR has a valid Issue?
on:
  pull_request_target:
    branches:
      - main
    types: [edited, synchronize, opened, labeled, unlabeled, reopened]
jobs:
  linked-issue-checker:
    name: PR has a valid Issue?
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
    steps:
      - uses: nearform-actions/github-action-check-linked-issues@7140e2e01aa0c18b8ac61bddf5e89abde1ca760e # v1.8.3
        with:
          exclude-branches: "release/**, dependabot/**"
          comment: true
          custom-body-comment: |
            This pull request is not linked to an issue from the PR description.

            Add a supported keyword such as `Fixes #123` or `Closes owner/repo#123`
            to the description and push the update.

            Linking from the sidebar does not trigger this check.
