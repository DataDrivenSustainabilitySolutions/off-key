services:

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    env_file: .env
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.backend == true ]
      restart_policy:
        condition: any

  api-gateway:
    image: "${API_GATEWAY_IMAGE:-off-key-api-gateway:latest}"
    env_file: .env
    networks:
      - app-network
    command: ["uvicorn", "off_key_api_gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: [ "CMD", "/app/bin/python", "-c",
              "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.labels.backend == true ]
      restart_policy:
        condition: any

  tactic-middleware:
    image: "${TACTIC_MIDDLEWARE_IMAGE:-off-key-tactic-middleware:latest}"
    env_file: .env
    networks:
      - app-network
      - socket-network
    environment:
      - TACTIC_DOCKER_DEFAULT_NETWORK=off-key_app-network
      - TACTIC_RADAR_IMAGE=${MQTT_RADAR_IMAGE:-ghcr.io/datadrivensustainabilitysolutions/off-key-mqtt-radar:latest}
    command: [ "/app/bin/python", "-m", "off_key_tactic_middleware" ]
    healthcheck:
      test: [ "CMD", "/app/bin/python", "-c",
              "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=2)" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.backend == true ]
      restart_policy:
        condition: any

  socket-proxy:
    image: tecnativa/docker-socket-proxy
    networks:
      - socket-network
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - LOG_LEVEL=info # debug,info,notice,warning,err,crit,alert,emerg
      ## Variables match the URL prefix (i.e. AUTH blocks access to /auth/* parts of the API, etc.).
      # 0 to revoke access.
      # 1 to grant access.
      ## Granted by Default
      - EVENTS=1
      - PING=1
      - VERSION=1
      ## Revoked by Default
      # Security critical
      - AUTH=0
      - SECRETS=0
      - POST=1 # Container(s) Lifecycle Management
      # Not always needed
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - CONTAINERS=1 # Required by TACTIC RADAR container fallback and cleanup.
      - DISTRIBUTION=0
      - EXEC=0
      - IMAGES=0
      - INFO=1 # Required for Swarm manager detection.
      - NETWORKS=0
      - NODES=0
      - PLUGINS=0
      - SERVICES=1 # Required by TACTIC RADAR Swarm orchestration.
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=1 # Required for Swarm service status checks.
      - VOLUMES=0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  frontend:
    image: "${FRONTEND_IMAGE:-off-key-frontend:latest}"
    env_file: .env
    networks:
      - public-network
      - app-network
    environment:
      - API_UPSTREAM=api-gateway:8000
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [ node.labels.frontend == true ]
      restart_policy:
        condition: any

  mailpit:
    image: axllent/mailpit:latest
    env_file: .env
    networks:
      - public-network
      - app-network
    deploy:
      replicas: 1
      placement:
        constraints: [node.labels.backend == true ]
      restart_policy:
        condition: any

  db-sync:
    image: "${DB_SYNC_IMAGE:-off-key-db-sync:latest}"
    env_file: .env
    command: [ "/app/bin/python", "-m", "off_key_db_sync" ]
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "/app/bin/python", "-c",
              "import urllib.request; urllib.request.urlopen('http://localhost:8009/ready/schema', timeout=2)" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

  mqtt-proxy:
    image: "${MQTT_PROXY_IMAGE:-off-key-mqtt-proxy:latest}"
    env_file: .env
    command: ["/app/bin/python", "-m", "off_key_mqtt_proxy"]
    networks:
      - app-network
      - emqx-network
    environment:
      - MQTT_BROKER_HOST=emqx-main
      - MQTT_TELEMETRY_ENABLED=true
    healthcheck:
      test: [ "CMD", "/app/bin/python", "-c",
              "import urllib.request; urllib.request.urlopen('http://localhost:8010/ready/bridge', timeout=2)" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

  emqx-main:
    image: emqx/emqx:6.2.2
    env_file: .env
    environment:
      - "EMQX_NODE_NAME=emqx@emqx-main"
      - "EMQX_NODE__COOKIE=${EMQX_NODE_COOKIE:-off-key-emqx-cookie-change-me}"
      - "EMQX_CLUSTER__DISCOVERY_STRATEGY=static"
      - "EMQX_CLUSTER__STATIC__SEEDS=[emqx@emqx-main]"
      - "EMQX_DASHBOARD__DEFAULT_USERNAME=${EMQX_DASHBOARD_USERNAME:-admin}"
      - "EMQX_DASHBOARD__DEFAULT_PASSWORD=${EMQX_DASHBOARD_PASSWORD:?EMQX_DASHBOARD_PASSWORD must be set}"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:18083/status" ]
      interval: 5s
      timeout: 25s
      retries: 5
    networks:
      emqx-network:
        aliases:
          - emqx-main
      app-network:
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

volumes:
  timescaledb-data:

# Overlay encryption is intentionally disabled because it is incompatible with
# the Tailscale ingress path. MTU 1280 preserves Tailscale compatibility.
networks:
  public-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
  app-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
    attachable: true
  socket-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
  emqx-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
