# WARNING: Encrypted overlay is incompatible with Tailscale
# MTU=1280 for tailscale0 compatibility
networks:
  public-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"
  app-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"
  socket-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"
  emqx-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"

