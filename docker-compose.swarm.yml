  tailscale-dev-proxy:
    image: tailscale/tailscale:latest
    volumes:
      - tailscale-dev-proxy-state:/var/lib/tailscale
    configs:
      - source: ts_serve_cfg
        target: /etc/tailscale/serve.json
    environment:
      - TS_AUTHKEY=${TAILSCALE_DEV_PROXY_AUTHKEY}
      - TS_HOSTNAME=off-key-dev
      - TS_USERSPACE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=false
      - TS_SERVE_CONFIG=/etc/tailscale/serve.json
    networks:
      - app-network
      - public-network
      - emqx-network
    deploy:
      replicas: ${TAILSCALE_DEV_PROXY_REPLICAS:-0}
      placement:
        constraints: [ node.role == manager ]
      restart_policy:
        condition: any

  tailscale-ambibox:
    image: tailscale/tailscale:latest
    cap_add:
      - net_admin
      - sys_module
    volumes:
      - tailscale-ambibox-state:/var/lib/tailscale
    env_file: .env
    environment:
      # No TS_AUTHKEY: identity is restored from persisted state volume
      - TS_USERSPACE=true
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=${TAILSCALE_AMBIBOX_EXTRA_ARGS}
      # SOCKS5 proxy on port 1055 — used by emqx-main to reach vendor MQTT over tailnet
      - TS_SOCKS5_SERVER=0.0.0.0:1055
    networks:
      - emqx-network
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

  mqtt-tailscale-bridge:
    # TCP forwarder: EMQX connects here, traffic is forwarded to the vendor MQTT broker
    # via the Tailscale SOCKS5 proxy. gost passes the .ts.net hostname to the proxy
    # for resolution, so Tailscale's MagicDNS handles it — not the container's own DNS.
    image: gogost/gost:3
    command:
      - "-L=tcp://:1883/${TAILSCALE_AMBIBOX_UPSTREAM_HOST}:1883"
      - "-F=socks5://tailscale-ambibox:1055"
    networks:
      - emqx-network
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

  emqx-main:
    image: emqx/emqx:5.8.7
    env_file: .env
    environment:
      - "EMQX_NODE_NAME=emqx@emqx-main"
      - "EMQX_CLUSTER__DISCOVERY_STRATEGY=static"
      - "EMQX_CLUSTER__STATIC__SEEDS=[emqx@emqx-main]"
    #    healthcheck:
    #      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
    #      interval: 5s
    #      timeout: 25s
    #      retries: 5
    networks:
      emqx-network:
        aliases:
          - emqx-main
