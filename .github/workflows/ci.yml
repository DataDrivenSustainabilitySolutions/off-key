name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182 # v5.4.1
        with:
          version: "0.9.9"

      - name: Sync backend tooling
        run: uv sync --project backend --all-packages --all-groups --frozen

      - name: Run pre-commit
        run: uv run --project backend pre-commit run --all-files --show-diff-on-failure

  frontend:
    name: frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-browser:
    name: frontend-browser
    runs-on: ubuntu-latest
    needs:
      - frontend
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start browser smoke stack
        run: docker compose up -d --build frontend mailpit

      - name: Wait for frontend
        run: |
          timeout 600 bash -c 'until curl -fsS http://localhost:5173/login > /dev/null; do sleep 5; done'

      - name: Wait for API gateway
        run: |
          timeout 600 bash -c 'until curl -fsS http://localhost:8000/health > /dev/null; do sleep 5; done'

      - name: Wait for Mailpit
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:8025/api/v1/messages > /dev/null; do sleep 2; done'

      - name: Run browser smoke tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Collect browser smoke logs
        if: failure()
        run: |
          docker compose ps > browser-smoke-compose-ps.txt
          docker compose logs --no-color \
            frontend api-gateway tactic-middleware db-sync timescaledb socket-proxy mailpit \
            > browser-smoke-compose.log

      - name: Upload browser smoke artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-browser-smoke-artifacts
          if-no-files-found: ignore
          path: |
            browser-smoke-compose-ps.txt
            browser-smoke-compose.log
            frontend/playwright-report
            frontend/test-results

      - name: Tear down browser smoke stack
        if: always()
        run: docker compose down -v
