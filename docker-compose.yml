services:

  api:
    build: ./backend/
    container_name: fastapi_app
    env_file: .env
    ports:
      - "8000:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres_db
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  timescale:
    image: timescale/timescaledb:latest-pg15
    container_name: timescale_db
    env_file: .env
    ports:
      - "${TIMESCALE_PORT}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - timescale_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: frontend_ui
    env_file: .env
    ports:
      - "3000:5173"
    depends_on:
      - api


networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  timescale_data: