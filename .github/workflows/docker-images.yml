name: Docker Images

on:
  workflow_call:
    inputs:
      publish:
        required: true
        type: boolean
      cache-scope-prefix:
        required: true
        type: string
      cache-fallback-scope-prefix:
        required: false
        type: string
        default: ""

jobs:
  build-images:
    name: build-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            image_name: off-key-frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            build_args: ""
          - service: api-gateway
            image_name: off-key-api-gateway
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-api-gateway
              SERVICE_ROOT=services/api/gateway
          - service: tactic-middleware
            image_name: off-key-tactic-middleware
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-tactic-middleware
              SERVICE_ROOT=services/middleware/tactic
          - service: mqtt-radar
            image_name: off-key-mqtt-radar
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-mqtt-radar
              SERVICE_ROOT=services/mqtt/radar
          - service: mqtt-proxy
            image_name: off-key-mqtt-proxy
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-mqtt-proxy
              SERVICE_ROOT=services/mqtt/proxy
          - service: mqtt-simulator
            image_name: off-key-mqtt-simulator
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-mqtt-simulator
              SERVICE_ROOT=services/mqtt/simulator
          - service: db-sync
            image_name: off-key-db-sync
            context: ./backend
            file: ./backend/Dockerfile
            build_args: |
              SERVICE_NAME=off-key-db-sync
              SERVICE_ROOT=services/db/sync

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Normalize registry owner
        id: owner
        if: ${{ inputs.publish }}
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.publish }}
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        if: ${{ inputs.publish }}
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build image
        if: ${{ !inputs.publish }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          push: false
          load: false
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}
            ${{ inputs.cache-fallback-scope-prefix && format('type=gha,scope={0}-{1}', inputs.cache-fallback-scope-prefix, matrix.service) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}

      - name: Build and push image
        id: build
        if: ${{ inputs.publish }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          build-args: ${{ matrix.build_args }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}
            ${{ inputs.cache-fallback-scope-prefix && format('type=gha,scope={0}-{1}', inputs.cache-fallback-scope-prefix, matrix.service) || '' }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope-prefix }}-${{ matrix.service }}

      - name: Attest build provenance
        if: ${{ inputs.publish }}
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  docker-validate:
    name: docker-validate
    runs-on: ubuntu-latest
    needs: build-images
    if: ${{ !inputs.publish && always() }}

    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.build-images.result }}" != "success" ]; then
            echo "At least one container build failed."
            exit 1
          fi
