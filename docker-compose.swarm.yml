volumes:
  tailscale-dev-proxy-state:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stacks/off-key/tailscale-dev-proxy-data

  tailscale-ambibox-state:
    driver: local
    driver_opts:
      type: none
      o: bind
      # Directory must exist on the backend node before stack deploy.
      # Populate it with the tailscaled.state from the working tailscale installation:
      #   scp -r ./data-ambibox/ <backend-node>:/opt/stacks/off-key/tailscale-ambibox-data/
      device: /opt/stacks/off-key/tailscale-ambibox-data

  # volumes:
  # postgres_data:
  # vite_cache:
  #   driver: local
  # frontend_node_modules:

configs:
  ts_serve_cfg:
    file: ./tailscale-serve.json

# For future reference
# configs:
#  mailpit_config:
#    file: ./dev/mailpit-user-file


# WARNING: Encrypted overlay is incompatible with Tailscale
# MTU=1280 for tailscale0 compatibility
networks:
  public-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"
  app-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"
    attachable: true
  socket-network:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"
  emqx-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: 1280
      # encrypted: "true"
