# .github/workflows/docker-compose-build-and-push.yml
name: Build & Push via Compose

on:
  push:
    branches:
      - main

permissions:
  contents: read      # for actions/checkout
  packages: write     # to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: set lower case owner name
        run: |
            echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
            OWNER: '${{ github.repository_owner }}'

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Override image tags to “latest”
        run: |
          echo "FRONTEND_IMAGE=ghcr.io/${{ env.OWNER_LC }}/off-key-frontend:latest" >> $GITHUB_ENV
          echo "API_GATEWAY_IMAGE=ghcr.io/${{ env.OWNER_LC }}/off-key-api-gateway:latest" >> $GITHUB_ENV
          echo "TACTIC_MIDDLEWARE_IMAGE=ghcr.io/${{ env.OWNER_LC }}/off-key-api-gateway:latest" >> $GITHUB_ENV
          echo "MQTT_RADAR_IMAGE=ghcr.io/${{ env.OWNER_LC }}/off-key-mqtt-radar:latest" >> $GITHUB_ENV
          echo "MQTT_PROXY_IMAGE=ghcr.io/${{ env.OWNER_LC }}/off-key-mqtt-proxy:latest" >> $GITHUB_ENV
          echo "DB_SYNC_IMAGE=ghcr.io/${{ env.OWNER_LC }}/off-key-db-sync:latest" >> $GITHUB_ENV
      - name: Build all services via Compose
        run: docker compose build --parallel

      - name: Push all images via Compose
        run: docker compose push
