    #      - target: 8084
    #        published: 8084
    #        mode: ingress
    #      - target: 8883
    #        published: 8883
    #        mode: ingress
    #      - target: 18083
    #        published: 18083
    #        mode: ingress
    deploy:
      replicas: 1
      placement:
        constraints: [ node.labels.backend == true ]
      restart_policy:
        condition: any

