services:

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: postgres_database
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.role == manager

  api:
    build: ./backend/
    container_name: fastapi_backend
    env_file: .env
    user: root
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      retries: 5
    volumes:
      - /etc/docker/ca.pem:/etc/docker/ca.pem
      - /etc/docker/client-cert.pem:/etc/docker/client-cert.pem
      - /etc/docker/client-key.pem:/etc/docker/client-key.pem
    deploy:
      mode: replicated
      replicas: 2
      placement:
        preferences:
          - spread: node.labels.type  # Distribute evenly
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  frontend:
    build: ./frontend
    container_name: react_frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/src
      - /src/node_modules  # Prevent conflicts
    deploy:
      mode: replicated
      replicas: 2
      placement:
        preferences:
          - spread: node.labels.type  # Distribute evenly
      resources:
        limits:
          cpus: '1'
          memory: 512M

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:
      - '8025:8025'  # Web UI
      - '1025:1025'  # SMTP port
    deploy:
      placement:
        constraints:
          - node.role == manager

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: