[project]
name = "off-key"
version = "0.1.0"
description = "TBD"
requires-python = ">=3.12"
dependencies = [
    "apscheduler>=3.11.0",
    "asyncpg>=0.30.0",
    "docker>=7.1.0",
    "email-validator>=2.2.0",
    "fastapi-mail>=1.4.2",
    "fastapi[all]>=0.115.8",
    "jwt>=1.3.1",
    "paho-mqtt>=2.1.0",
    "passlib>=1.7.4",
    "psycopg2-binary>=2.9.10",
    "pydantic-settings>=2.7.1",
    "python-jose>=3.4.0",
    "requests>=2.32.3",
    "sqlalchemy>=2.0.38",
    "urllib3>=2.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/off_key"]

[tool.hatch.build]
only-packages = true
