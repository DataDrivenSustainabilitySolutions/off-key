services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: postgres_database
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend/
    container_name: fastapi_backend
    env_file: .env
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  frontend:
    build: ./frontend
    container_name: react_frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/src
      - /src/node_modules  # Prevent conflicts

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./data:/data
    ports:

      - "8025:8025" # Web UI
      - "1025:1025" # SMTP port

      - '8025:8025'  # Web UI
      - '1025:1025'  # SMTP port
    networks:
    - app-network


networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
