name: Deployment Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deployment-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-smoke:
    name: deployment-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start deployment smoke stack
        run: docker compose up -d --build frontend mailpit

      - name: Wait for frontend
        run: |
          timeout 600 bash -c 'until curl -fsS http://localhost:5173/login > /dev/null; do sleep 5; done'

      - name: Wait for tactic middleware
        run: |
          timeout 600 bash -c 'until curl -fsS http://localhost:8001/ready > /dev/null; do sleep 5; done'

      - name: Wait for API gateway
        run: |
          timeout 600 bash -c 'until curl -fsS http://localhost:8000/health > /dev/null; do sleep 5; done'

      - name: Wait for Mailpit
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:8025/api/v1/messages > /dev/null; do sleep 2; done'

      - name: Verify Docker Compose service states
        run: |
          timeout 600 bash -c '
            set -euo pipefail
            required_running=(react_client socket_proxy mailpit)
            required_healthy=(api_gateway tactic_middleware db_sync timescaledb)

            while true; do
              all_ready=true

              for container in "${required_running[@]}"; do
                status="$(docker inspect --format "{{.State.Status}}" "$container" 2>/dev/null || true)"
                if [[ "$status" != "running" ]]; then
                  echo "$container status=$status"
                  all_ready=false
                fi
              done

              for container in "${required_healthy[@]}"; do
                status="$(docker inspect --format "{{.State.Status}}" "$container" 2>/dev/null || true)"
                health="$(docker inspect --format "{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}" "$container" 2>/dev/null || true)"
                if [[ "$status" != "running" || "$health" != "healthy" ]]; then
                  echo "$container status=$status health=$health"
                  all_ready=false
                fi
              done

              if [[ "$all_ready" == "true" ]]; then
                exit 0
              fi

              sleep 5
            done
          '

      - name: Run deployment smoke test
        working-directory: frontend
        run: npm run test:e2e

      - name: Collect deployment smoke logs
        if: failure()
        run: |
          docker compose ps --all > deployment-smoke-compose-ps.txt || true
          docker compose logs --no-color \
            frontend api-gateway tactic-middleware db-sync timescaledb socket-proxy mailpit \
            > deployment-smoke-compose.log || true

      - name: Upload deployment smoke artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deployment-smoke-artifacts
          if-no-files-found: ignore
          path: |
            deployment-smoke-compose-ps.txt
            deployment-smoke-compose.log
            frontend/playwright-report
            frontend/test-results

      - name: Tear down deployment smoke stack
        if: always()
        run: docker compose down -v
